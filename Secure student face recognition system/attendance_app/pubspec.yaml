name: attendance_app
description: "Face Recognition Attendance System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^14.0.0

  # Database
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.22

  # HTTP
  dio: ^5.4.0

  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.0
  path: ^1.9.0
  csv: ^6.0.0
  uuid: ^4.4.0
  shared_preferences: ^2.3.0
  crypto: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
